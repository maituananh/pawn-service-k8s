apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fe-pawn-service-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: "fe-pawn.prod.localhost"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: fe-pawn-service
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: be-pawn-service-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: "api-pawn.prod.localhost"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: be-pawn-service
                port:
                  number: 80